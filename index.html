<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MAOS — Catálogo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="catalog-page maos-minimal-v28">
  <header class="minimal-sitebar">
    <div></div>
    <p>PEDIDO DIRECTO POR WHATSAPP · CATÁLOGO PÚBLICO MAOS</p>
    <nav>
      <button type="button" id="searchToggleBtn">SEARCH</button>
      <button type="button" id="scrollCartBtn">BAG</button>
    </nav>
  </header>

  <div class="minimal-shop-shell">
    <aside class="minimal-shop-sidebar">
      <a class="minimal-shop-logo" href="index.html" id="publicBrandLogo">MAOS</a>
      <nav class="minimal-shop-nav">
        <button class="catalog-side-link active" data-side-category="">SHOP ALL</button>
        <div id="categoryNav"></div>
      </nav>
      <div class="minimal-shop-footer">© MAOS</div>
    </aside>

    <main class="minimal-shop-main">
      <div class="minimal-shop-controls">
        <div class="minimal-control-left">
          <button type="button" id="toggleFiltersBtn">FILTER</button>
          <span id="activeCategoryLabel">SHOP ALL</span>
        </div>
        <div class="minimal-control-right" id="filterPanel">
          <input id="searchInput" type="search" placeholder="SEARCH" />
          <select id="categoryFilter"><option value="">Todas</option></select>
          <select id="sizeFilter"><option value="">Talla</option></select>
          <select id="colorFilter"><option value="">Color</option></select>
          <a href="admin.html">PANEL</a>
        </div>
      </div>

      <section id="cart" class="minimal-shop-cart"></section>
      <section id="catalogGrid" class="minimal-product-grid"></section>
      <p id="catalogStatus" class="minimal-catalog-status"></p>
    </main>
  </div>

  <dialog id="quickViewModal" class="modal quickview-modal">
    <div class="modal-card quickview-card">
      <div class="modal-head">
        <h3>Vista rápida</h3>
        <button class="icon-btn" id="closeQuickView" type="button">×</button>
      </div>
      <div id="quickViewContent"></div>
    </div>
  </dialog>

  <script src="cloud-config.js"></script>
  <script type="module" src="public-catalog.js"></script>
</body>
</html>
